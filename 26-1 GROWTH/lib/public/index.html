
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Place Insert</title>
    <style>
      :root {
        --bg: #f6f4ee;
        --panel: rgba(255, 253, 248, 0.94);
        --line: #e5dcc3;
        --text: #1f1a12;
        --muted: #6c6254;
        --accent: #d39b18;
        --accent-strong: #b47f08;
        --danger: #c84f3d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          "Pretendard",
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, #fff2bf 0, transparent 24%),
          linear-gradient(180deg, #faf7ef 0%, var(--bg) 100%);
      }

      .page {
        width: min(880px, calc(100% - 32px));
        margin: 32px auto 48px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 18px 40px rgba(58, 46, 20, 0.08);
        padding: 22px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
        gap: 20px;
        align-items: start;
      }

      .panel h2 {
        margin: 0 0 16px;
        font-size: 20px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: minmax(140px, 0.6fr) minmax(0, 1.4fr);
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .hidden {
        display: none;
      }

      label {
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        border: 1px solid #d9cfb2;
        border-radius: 14px;
        padding: 12px 14px;
        background: white;
        font: inherit;
        color: inherit;
      }

      .hint {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .inline-actions {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }

      .inline-actions input {
        flex: 1;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 13px 18px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #211600;
      }

      .primary:hover {
        background: var(--accent-strong);
      }

      .danger {
        background: #f6dbd6;
        color: #6d1f14;
      }

      .secondary {
        background: #efe5c7;
        color: #4f3a08;
      }

      .status {
        margin-top: 16px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid #eadfc1;
        background: #fff7db;
        white-space: pre-wrap;
        line-height: 1.6;
        font-size: 14px;
      }

      .status.error {
        background: #fff0ee;
        border-color: #f0c2bb;
        color: #7b2417;
      }

      .preview {
        background: #17140f;
        color: #f8f3ea;
        border-radius: 18px;
        padding: 16px;
        min-height: 520px;
        overflow: auto;
        font-size: 13px;
        line-height: 1.55;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        .preview {
          min-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <div class="layout">
          <div>
            <h2>필수 입력</h2>
            <form id="place-form">
              <div class="form-grid">
                <div class="field">
                  <label for="contentId">contentId</label>
                  <input id="contentId" name="contentId" required />
                  <p class="hint">문서 ID로 그대로 저장됩니다.</p>
                </div>

                <div class="field">
                  <label for="title">장소명</label>
                  <div class="inline-actions">
                    <input id="title" name="title" required />
                    <button
                      class="secondary"
                      type="button"
                      id="lookup-by-title"
                    >
                      장소명으로 조회
                    </button>
                  </div>
                </div>

                <div class="field full">
                  <label for="addr1">기본 주소</label>
                  <input id="addr1" name="addr1" required />
                </div>

                <div class="field full">
                  <label for="firstimage">대표 이미지 URL firstimage</label>
                  <input id="firstimage" name="firstimage" type="url" />
                </div>

                <div class="field">
                  <label for="mapX">경도 mapX</label>
                  <input id="mapX" name="mapX" type="number" step="any" required />
                </div>

                <div class="field">
                  <label for="mapY">위도 mapY</label>
                  <input id="mapY" name="mapY" type="number" step="any" required />
                </div>

                <div class="field">
                  <label for="sidoSelect">시/도</label>
                  <select id="sidoSelect" name="sidoSelect" required></select>
                </div>

                <div class="field">
                  <label for="sigunguSelect">시/군/구</label>
                  <select id="sigunguSelect" name="sigunguSelect" required></select>
                </div>

                <div class="field">
                  <label for="lclsSystm1">카테고리</label>
                  <select id="lclsSystm1" name="lclsSystm1">
                    <option value="FD">FD · 음식점</option>
                    <option value="AC">AC · 숙소</option>
                    <option value="SH">SH · 쇼핑</option>
                    <option value="LS">LS · 스포츠</option>
                    <option value="EX">EX · 체험관광</option>
                    <option value="NA">NA · 자연관광</option>
                    <option value="VE">VE · 문화관광</option>
                    <option value="HS">HS · 역사관광</option>
                  </select>
                </div>
              </div>

              <div class="actions">
                <button class="primary" type="submit">저장</button>
                <button class="secondary" type="button" id="update-place">
                  수정
                </button>
                <button class="danger" type="button" id="delete-place">
                  삭제
                </button>
                <button class="danger" type="button" id="reset-form">폼 초기화</button>
              </div>
            </form>

            <div id="status" class="status">지역 목록을 불러오는 중입니다...</div>
          </div>

          <div>
            <h2>저장 미리보기</h2>
            <pre id="preview" class="preview">{}</pre>
          </div>
        </div>

        <input id="seedRegionSidoCode" class="hidden" />
        <input id="seedRegionSidoName" class="hidden" />
        <input id="seedRegionSigunguCode" class="hidden" />
        <input id="seedRegionSigunguName" class="hidden" />
      </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
